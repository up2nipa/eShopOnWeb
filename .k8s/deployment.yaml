# apiVersion: v1
# kind: Namespace
# metadata:
#   name: eshoponweb-user002
# ---

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: eshoponweb-user002
  labels:
    app: eshoponweb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshoponweb
  template:
    metadata:
      labels:
        app: eshoponweb
    spec:
      containers:
        - name: eshoponweb
          image: aistraining.azurecr.io/eshoponweb-user002:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: http://+:80
            - name: WebApiBaseAddress
              value: http://webapi
